<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astral Archive | Alexander Pinlac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --sr-navy: #0c1220; 
            --sr-gold: #c9a55c; 
            --glass: rgba(22, 31, 50, 0.85); 
            --nav-hover: rgba(201, 165, 92, 0.2);
        }
        
        body { background: var(--sr-navy); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
       
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(30%); }

        
        .navbar-nav .nav-link {
            color: white !important;
            padding: 10px 20px !important;
            border-radius: 5px;
            transition: all 0.3s ease;
            position: relative;
        }
        .navbar-nav .nav-link:hover {
            background: var(--nav-hover);
            color: var(--sr-gold) !important;
        }

        
        .author-section { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(201, 165, 92, 0.4); 
            border-radius: 20px; padding: 50px; margin-bottom: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 200px; height: 200px; border-radius: 50%; 
            border: 4px solid var(--sr-gold); padding: 5px;
            object-fit: cover; box-shadow: 0 0 20px rgba(201, 165, 92, 0.3);
        }

        
        .skill-box { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(201, 165, 92, 0.3); 
            border-radius: 25px; 
            padding: 30px 20px; 
            text-align: center; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        .skill-box:hover {
            background: rgba(201, 165, 92, 0.1);
            transform: scale(1.05);
            border-color: var(--sr-gold);
            box-shadow: 0 0 25px rgba(201, 165, 92, 0.2);
        }
        .skill-icon { 
            width: 150px;
            height: 150px; 
            margin-bottom: 30px; 
            object-fit: cover;
            border-radius: 15px;
            filter: drop-shadow(0 0 12px rgba(201, 165, 92, 0.5));
        }

        .full-intel-text {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #d1d1d1;
            white-space: pre-line;
        }

        .card { background: var(--glass) !important; border: 1px solid rgba(201, 165, 92, 0.2); color: white; }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://res.cloudinary.com/dqzwt5h4z/video/upload/v1777049214/bg_video_xqihzy.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="index-loop-player" autoplay loop></audio>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top px-4" style="background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--sr-gold);">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">ASTRAL ARCHIVE</a>
            <div class="navbar-nav ms-auto d-flex align-items-center">
                <a class="nav-link mx-2" href="#about">BIOGRAPHY</a>
                <a class="nav-link mx-2" href="#skills">SKILLS</a>
                <a class="nav-link mx-2" href="#projects">PROJECTS</a>
                <a class="btn btn-outline-warning btn-sm ms-3" href="login.html" style="line-height: 1.5;">ADMIN LOGIN</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <section class="author-section" id="about">
            <div class="row">
                <div class="col-lg-12 text-center mb-5">
                    <img src="assets/images/alex.jpg" class="profile-img mb-3" alt="Profile">
                    <h1 class="fw-bold" style="color: var(--sr-gold); letter-spacing: 5px;"></h1>
                    <p class="text-secondary text-uppercase" style="letter-spacing: 10px;"></p>
                </div>
                <div class="col-lg-10 offset-lg-1">
                    <div class="p-4" style="border-left: 3px solid var(--sr-gold); background: rgba(255,255,255,0.02);">
                        <h4 class="mb-4" style="color: var(--sr-gold); letter-spacing: 2px;">Data Bank: Intelligence Dossier</h4>
                        <p class="lead mb-4 fw-bold" style="color: white;"></p>
                        <div class="full-intel-text"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="author-section" id="skills">
            <div class="text-center mb-5">
                <h2 style="color: var(--sr-gold); letter-spacing: 4px;">TECHNICAL INTELLIGENCE</h2>
                <div style="width: 50px; height: 2px; background: var(--sr-gold); margin: 10px auto;"></div>
            </div>
            <div class="row g-4 justify-content-center">
                <!-- Skills will be loaded here by JavaScript -->
            </div>
        </section>

        <div class="row pb-5" id="projects">
            <!-- Projects will be loaded here by JavaScript -->
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize storage and load page content
        StorageManager.init();
        window.addEventListener('load', initHomePage);
    </script>
</body>
</html>
